<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 230" role="img" aria-label="Anatomy of a scrape: fetch, clean, convert, write, index" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.5" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="230" rx="20" fill="#0B1220"/>
  <text x="30" y="38" font-size="15" font-weight="700" letter-spacing="1.5" fill="#7DD3FC">ANATOMY OF A SCRAPE</text>

  <line x1="70" y1="118" x2="850" y2="118" stroke="url(#line)" stroke-width="3"/>

  <!-- 5 steps -->
  <g font-size="13.5" fill="#E2E8F0" filter="url(#soft)">
    <!-- 1 -->
    <g transform="translate(70,118)">
      <circle r="22" fill="#4F46E5"/>
      <text y="6" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
    </g>
    <text x="70" y="72" text-anchor="middle" font-weight="700" fill="#ffffff">Fetch</text>
    <text x="70" y="160" text-anchor="middle" fill="#94A3B8">block private hosts,</text>
    <text x="70" y="178" text-anchor="middle" fill="#94A3B8">verify each redirect</text>

    <!-- 2 -->
    <g transform="translate(265,118)">
      <circle r="22" fill="#3B82F6"/>
      <text y="6" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
    </g>
    <text x="265" y="72" text-anchor="middle" font-weight="700" fill="#ffffff">Clean</text>
    <text x="265" y="160" text-anchor="middle" fill="#94A3B8">strip script/nav/footer,</text>
    <text x="265" y="178" text-anchor="middle" fill="#94A3B8">size + type checked</text>

    <!-- 3 -->
    <g transform="translate(460,118)">
      <circle r="22" fill="#0EA5E9"/>
      <text y="6" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
    </g>
    <text x="460" y="72" text-anchor="middle" font-weight="700" fill="#ffffff">Convert</text>
    <text x="460" y="160" text-anchor="middle" fill="#94A3B8">HTML → Markdown,</text>
    <text x="460" y="178" text-anchor="middle" fill="#94A3B8">links made absolute</text>

    <!-- 4 -->
    <g transform="translate(655,118)">
      <circle r="22" fill="#06B6D4"/>
      <text y="6" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
    </g>
    <text x="655" y="72" text-anchor="middle" font-weight="700" fill="#ffffff">Write</text>
    <text x="655" y="160" text-anchor="middle" fill="#94A3B8">pages/*.md with</text>
    <text x="655" y="178" text-anchor="middle" fill="#94A3B8">source + timestamp</text>

    <!-- 5 -->
    <g transform="translate(850,118)">
      <circle r="22" fill="#22D3AA"/>
      <text y="6" font-size="18" font-weight="800" fill="#0B1220" text-anchor="middle">5</text>
    </g>
    <text x="850" y="72" text-anchor="middle" font-weight="700" fill="#ffffff">Index</text>
    <text x="850" y="160" text-anchor="middle" fill="#94A3B8">index.md + context.md</text>
    <text x="850" y="178" text-anchor="middle" fill="#94A3B8">ready for your agent</text>
  </g>

  <text x="30" y="212" font-size="12.5" fill="#64748B">Same pipeline for every URL, regardless of discovery mode (url-list · llms · sitemap · crawl).</text>
</svg>
