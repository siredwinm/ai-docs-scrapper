<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" role="img" aria-label="AI Docs Scraper — turn documentation sites into clean Markdown context for AI agents" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.55" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="880" height="280" rx="22" fill="url(#bg)"/>

  <!-- decorative document glyphs -->
  <g opacity="0.16" fill="none" stroke="#ffffff" stroke-width="3">
    <rect x="690" y="44" width="120" height="150" rx="10"/>
    <line x1="712" y1="78" x2="788" y2="78"/>
    <line x1="712" y1="102" x2="788" y2="102"/>
    <line x1="712" y1="126" x2="762" y2="126"/>
    <line x1="712" y1="150" x2="788" y2="150"/>
  </g>

  <!-- title -->
  <text x="60" y="104" font-size="52" font-weight="800" fill="#ffffff">AI Docs Scraper</text>
  <text x="62" y="146" font-size="22" font-weight="500" fill="#EAF2FF">Turn documentation sites into clean Markdown context for AI agents.</text>
  <text x="62" y="176" font-size="15" font-weight="500" fill="#CFE3FF" opacity="0.9">No API key · SSRF-safe fetching · prompt-injection aware · 100% local</text>

  <!-- pipeline -->
  <g filter="url(#shadow)">
    <g transform="translate(62,206)">
      <rect width="118" height="40" rx="10" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
      <text x="59" y="25" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">docs source</text>
    </g>
    <text x="190" y="231" font-size="20" fill="#ffffff" opacity="0.9">→</text>
    <g transform="translate(214,206)">
      <rect width="132" height="40" rx="10" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
      <text x="66" y="25" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">safe fetch</text>
    </g>
    <text x="356" y="231" font-size="20" fill="#ffffff" opacity="0.9">→</text>
    <g transform="translate(380,206)">
      <rect width="150" height="40" rx="10" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
      <text x="75" y="25" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">clean HTML</text>
    </g>
    <text x="540" y="231" font-size="20" fill="#ffffff" opacity="0.9">→</text>
    <g transform="translate(564,206)">
      <rect width="150" height="40" rx="10" fill="#ffffff"/>
      <text x="75" y="25" font-size="15" font-weight="700" fill="#0B5FA5" text-anchor="middle">Markdown .md</text>
    </g>
  </g>
</svg>
